name: Test - Deploy minimal worker

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create test worker
        run: |
          mkdir -p test-worker
          cat > test-worker/wrangler.jsonc << 'EOF'
          {
            "name": "autocontent-test",
            "main": "src/worker.js",
            "compatibility_date": "2025-06-01",
            "compatibility_flags": ["nodejs_compat"]
          }
          EOF
          cat > test-worker/src/worker.js << 'EOF'
          export default {
            async fetch(request, env, ctx) {
              return new Response("Hello from test worker at " + Date.now(), {
                headers: { "content-type": "text/plain" }
              });
            }
          };
          EOF

      - name: Deploy test worker
        run: npx --yes wrangler@latest deploy
        working-directory: test-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
