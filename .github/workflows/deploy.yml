name: Deploy to Cloudflare

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: npx opennextjs-cloudflare build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REDIRECT_URI: ${{ secrets.LINKEDIN_REDIRECT_URI }}

      - name: Deploy
        run: |
          npx --yes wrangler@latest deploy \
            --account-id "$CLOUDFLARE_ACCOUNT_ID" \
            --verbose
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set runtime secrets
        if: success()
        run: |
          echo "${{ secrets.DATABASE_URL }}" | npx wrangler secret put DATABASE_URL --account-id "$CLOUDFLARE_ACCOUNT_ID"
          echo "${{ secrets.GEMINI_API_KEY }}" | npx wrangler secret put GEMINI_API_KEY --account-id "$CLOUDFLARE_ACCOUNT_ID"
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET --account-id "$CLOUDFLARE_ACCOUNT_ID"
          echo "${{ secrets.LINKEDIN_CLIENT_ID }}" | npx wrangler secret put LINKEDIN_CLIENT_ID --account-id "$CLOUDFLARE_ACCOUNT_ID"
          echo "${{ secrets.LINKEDIN_CLIENT_SECRET }}" | npx wrangler secret put LINKEDIN_CLIENT_SECRET --account-id "$CLOUDFLARE_ACCOUNT_ID"
          echo "${{ secrets.LINKEDIN_REDIRECT_URI }}" | npx wrangler secret put LINKEDIN_REDIRECT_URI --account-id "$CLOUDFLARE_ACCOUNT_ID"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
