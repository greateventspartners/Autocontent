name: Deploy to Cloudflare

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Patch worker template
        run: node scripts/patch-worker-template.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Debug - verify patch applied
        run: |
          echo "=== Template worker.js (first 5 lines) ==="
          head -5 node_modules/@opennextjs/cloudflare/dist/cli/templates/worker.js
          grep -c "return await" node_modules/@opennextjs/cloudflare/dist/cli/templates/worker.js && echo "PATCH OK: return await found" || echo "PATCH MISSING: return await not found"
          grep -c "getMwHandler" node_modules/@opennextjs/cloudflare/dist/cli/templates/worker.js && echo "PATCH OK: dynamic middleware found" || echo "PATCH MISSING: dynamic middleware not found"

      - name: Build
        run: npx opennextjs-cloudflare build

      - name: Debug - verify build output
        run: |
          echo "=== .open-next/worker.js (first 10 lines) ==="
          head -10 .open-next/worker.js
          echo "=== .open-next/worker.js (lines with 'try' or 'await') ==="
          grep -n "try\|return await\|getMwHandler\|catch" .open-next/worker.js || echo "No debug markers found"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REDIRECT_URI: ${{ secrets.LINKEDIN_REDIRECT_URI }}

      - name: Deploy
        run: npx --yes wrangler@latest deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set runtime secrets
        if: success()
        run: |
          echo "${{ secrets.DATABASE_URL }}" | npx wrangler secret put DATABASE_URL
          echo "${{ secrets.GEMINI_API_KEY }}" | npx wrangler secret put GEMINI_API_KEY
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET
          echo "${{ secrets.LINKEDIN_CLIENT_ID }}" | npx wrangler secret put LINKEDIN_CLIENT_ID
          echo "${{ secrets.LINKEDIN_CLIENT_SECRET }}" | npx wrangler secret put LINKEDIN_CLIENT_SECRET
          echo "${{ secrets.LINKEDIN_REDIRECT_URI }}" | npx wrangler secret put LINKEDIN_REDIRECT_URI
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
