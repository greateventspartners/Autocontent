name: Deploy to Cloudflare

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REDIRECT_URI: ${{ secrets.LINKEDIN_REDIRECT_URI }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          FACEBOOK_REDIRECT_URI: ${{ secrets.FACEBOOK_REDIRECT_URI }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REDIRECT_URI: ${{ secrets.TIKTOK_REDIRECT_URI }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REDIRECT_URI: ${{ secrets.YOUTUBE_REDIRECT_URI }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REDIRECT_URI: ${{ secrets.PINTEREST_REDIRECT_URI }}
          WORDPRESS_CLIENT_ID: ${{ secrets.WORDPRESS_CLIENT_ID }}
          WORDPRESS_CLIENT_SECRET: ${{ secrets.WORDPRESS_CLIENT_SECRET }}
          WORDPRESS_REDIRECT_URI: ${{ secrets.WORDPRESS_REDIRECT_URI }}
          MEDIUM_CLIENT_ID: ${{ secrets.MEDIUM_CLIENT_ID }}
          MEDIUM_CLIENT_SECRET: ${{ secrets.MEDIUM_CLIENT_SECRET }}
          MEDIUM_REDIRECT_URI: ${{ secrets.MEDIUM_REDIRECT_URI }}

      - name: Debug instrumentation state
        run: |
          echo "=== node_modules patched file ==="
          grep -n "cachedInstrumentationModule" node_modules/next/dist/esm/server/lib/router-utils/instrumentation-globals.external.js || echo "FILE NOT FOUND"
          echo ""
          echo "=== .open-next server-functions instrumentation file ==="
          find .open-next -name "instrumentation-globals.external.js" -exec grep -n "cachedInstrumentationModule\|require\|INSTRUMENTATION_HOOK_FILENAME" {} + 2>/dev/null || echo "NOT FOUND in .open-next"
          echo ""
          echo "=== Does .next/server/instrumentation.js exist? ==="
          find .open-next -path "*/.next/server/instrumentation.js" -exec echo "EXISTS: {}" \; 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== worker.js instrumentation references ==="
          grep -c "instrumentation" .open-next/worker.js 2>/dev/null || echo "worker.js not found"
          grep -oP '.{0,80}Dynamic require.{0,80}' .open-next/worker.js 2>/dev/null | head -5 || echo "no dynamic require found"
          grep -oP '.{0,80}getInstrumentationModule.{0,80}' .open-next/worker.js 2>/dev/null | head -5 || echo "no getInstrumentationModule found"
          echo ""
          echo "=== handler.mjs instrumentation references ==="
          find .open-next -name "handler.mjs" -exec grep -oP '.{0,100}instrumentation.{0,100}' {} + 2>/dev/null | head -10 || echo "no handler.mjs found"

      - name: Patch build output (suppress instrumentation error)
        run: node scripts/patch-build-output.js

      - name: Populate cache
        run: npx opennextjs-cloudflare populateCache
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare (wrangler)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
